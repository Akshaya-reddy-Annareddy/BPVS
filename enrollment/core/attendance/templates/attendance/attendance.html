<!DOCTYPE html>
<html>
<head>
    <title>Smart Attendance System</title>
</head>
<body>

<h2>AI Face Attendance</h2>

<video id="preview" width="400" autoplay muted></video>
<br><br>

<button id="startBtn" onclick="startCamera()">Start Camera</button>
<button id="markBtn" onclick="markAttendance()" disabled>Mark Attendance</button>

<p id="status">Idle</p>

<script>
let stream = null;
let isProcessing = false;


let retryCount = 0;
const MAX_RETRY = 3;

async function startCamera() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
        document.getElementById("preview").srcObject = stream;
        document.getElementById("status").innerText = "Camera started";
        document.getElementById("markBtn").disabled = false;
    } catch (err) {
        console.error(err);
        document.getElementById("status").innerText = "Camera access denied";
    }
}

function captureFrame() {
    const video = document.getElementById("preview");
    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    return new Promise(resolve => {
        canvas.toBlob(blob => {
            resolve(blob);
        }, "image/jpeg");
    });
}

async function markAttendance() {
    if (isProcessing) return;
    isProcessing = true;

    try {
        document.getElementById("status").innerText = "Checking liveness...";

        const formData = new FormData();

        for (let i = 0; i < 8; i++) { // reduce frames
            const blob = await captureFrame();
            formData.append("files", blob, `frame_${i}.jpg`);
            await new Promise(r => setTimeout(r, 80)); // faster capture
        }

        document.getElementById("status").innerText = "Verifying face...";

        const response = await fetch("https://fictional-space-adventure-975www67xxr427vv5-8001.app.github.dev/verify-face/", {
            method: "POST",
            body: formData,
            signal: AbortSignal.timeout(10000)
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === "success"){
                alert("Attendance marked successfully");
                retryCount = 0;
            }

            else if (data.allow_retry && retryCount < MAX_RETRY) {
                retryCount++;
                alert(data.reason+ "\nRetry attempt: " + retryCount);
            }
            else{
                alert("Attendance failed after 3 attempts. Contact Admin.");
                retryCount = 0;
            }
        })
        .catch(error => {
            console.error("Error:", error);
        });

        if (!response.ok) {
            throw new Error("AI Server not reachable");
        }

        if(result.status === "spoof_detected") {
            document.getElementById("markBtn").disabled = true;
        }

        const result = await response.json();
        document.getElementById("status").innerText = result.message;

    } catch (error) {
        console.error(error);
        document.getElementById("status").innerText =
            "AI Server Offline (Start FastAPI on port 8001)";
    }

    isProcessing = false;
}

</script>

</body>
</html>
