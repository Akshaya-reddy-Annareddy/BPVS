{% extends "admin/base.html" %}
{% block content %}

<div class="max-w-3xl mx-auto space-y-10">

    <!-- Profile Details -->
    <div class="glass p-8 rounded-2xl">
        <h2 class="text-2xl font-bold mb-6 text-indigo-400">
            Profile Details
        </h2>

        <div class="grid md:grid-cols-2 gap-6">

            <div>
                <label class="text-sm text-white/60">Username</label>
                <input type="text"
                       value="{{ request.user.username }}"
                       class="w-full mt-2 p-3 rounded-xl bg-white/5 border border-white/10"
                       disabled>
            </div>

            <div>
                <label class="text-sm text-white/60">Admin ID</label>
                <input type="text"
                       value="{{ request.user.admission_id }}"
                       class="w-full mt-2 p-3 rounded-xl bg-white/5 border border-white/10"
                       disabled>
            </div>


    <!-- Change Password -->
    <div class="glass p-8 rounded-2xl">
        <h2 class="text-xl font-bold mb-6 text-indigo-400">
            Change Password
        </h2>

        <form method="POST">
            {% csrf_token %}

            <div class="space-y-4">

                <input type="password"
                       name="current_password"
                       placeholder="Current Password"
                       required
                       class="w-full p-3 rounded-xl bg-white/5 border border-white/10">

                <input type="password"
                       name="new_password"
                       placeholder="New Password"
                       required
                       class="w-full p-3 rounded-xl bg-white/5 border border-white/10">

                <button type="submit"
                        class="px-6 py-3 bg-indigo-600 rounded-xl hover:bg-indigo-700">
                    Update Password
                </button>

            </div>

        </form>
    </div>


    <!-- Logout -->
    <div class="glass p-8 rounded-2xl text-center">

        <h2 class="text-xl font-bold mb-4 text-red-400">
            Logout
        </h2>

        <a href="{% url 'logout' %}"
           class="px-6 py-3 bg-red-600 rounded-xl hover:bg-red-700">
            Logout
        </a>

    </div>

</div>

{% endblock %}
