{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BPVS | Authentication</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .auth-card { transition: all 0.4s ease-in-out; }
        .hidden-section { max-height: 0; overflow: hidden; opacity: 0; transition: all 0.3s ease; }
        .visible-section { max-height: 500px; opacity: 1; transition: all 0.3s ease; }
    </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 flex items-center justify-center px-4">

<div class="w-full max-w-md">
    <div class="auth-card bg-white shadow-2xl rounded-2xl p-8 relative overflow-hidden">

        <!-- Toggle -->
        <div class="flex justify-center mb-6">
            <button id="loginTab" class="px-4 py-2 font-semibold text-indigo-600 border-b-2 border-indigo-600">
                Login
            </button>
            <button id="signupTab" class="px-4 py-2 font-semibold text-gray-400 hover:text-indigo-600">
                Signup
            </button>
        </div>

        <!-- LOGIN FORM -->
        <form id="loginForm" method="POST" action="/accounts/login/" class="space-y-4">
            {% csrf_token %}

            <h2 class="text-2xl font-bold text-center text-gray-800">Welcome Back</h2>

            <div>
                <label class="block text-sm font-medium text-gray-600">Username</label>
                <input type="text" name="username" required
                       class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-600">Password</label>
                <input type="password" name="password" required
                       class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>

            <button type="submit"
                    class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 font-semibold">
                Login
            </button>
        </form>

        <!-- SIGNUP FORM -->
        <form id="signupForm" method="POST" action="/accounts/signup/" class="space-y-4 hidden">
            {% csrf_token %}

            <h2 class="text-2xl font-bold text-center text-gray-800">Create Account</h2>

            <div>
                <label class="block text-sm font-medium text-gray-600">Username</label>
                <input type="text" name="username" required
                       class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-600">Password</label>
                <input type="password" name="password" required
                       class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-600">Confirm Password</label>
                <input type="password" name="confirm_password" required
                       class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-600">Role</label>
                <select id="roleSelect" name="role" required
                        class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                    <option value="">Select Role</option>
                    <option value="student">Student</option>
                    <option value="lecturer">Lecturer</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <!-- Student Fields -->
            <div id="studentFields" class="hidden-section space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600">Admission ID</label>
                    <input type="text" name="admission_id"
                           class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600">Date of Birth</label>
                    <input type="date" name="dob"
                           class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>

            <!-- Lecturer -->
            <div id="lecturerFields" class="hidden-section">
                <label class="block text-sm font-medium text-gray-600">Lecturer ID</label>
                <input type="text" name="lecturer_id"
                       class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500">
            </div>

            <!-- Admin -->
            <div id="adminFields" class="hidden-section">
                <label class="block text-sm font-medium text-gray-600">Admin ID</label>
                <input type="text" name="admin_id"
                       class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500">
            </div>

            <button type="submit"
                    class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 font-semibold">
                Sign Up
            </button>
        </form>

    </div>
</div>

<script>
    const loginTab = document.getElementById('loginTab');
    const signupTab = document.getElementById('signupTab');
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');
    const roleSelect = document.getElementById('roleSelect');

    const studentFields = document.getElementById('studentFields');
    const lecturerFields = document.getElementById('lecturerFields');
    const adminFields = document.getElementById('adminFields');

    loginTab.onclick = () => {
        loginForm.classList.remove('hidden');
        signupForm.classList.add('hidden');
        loginTab.classList.add('text-indigo-600','border-indigo-600');
        signupTab.classList.remove('text-indigo-600','border-indigo-600');
    };

    signupTab.onclick = () => {
        signupForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
        signupTab.classList.add('text-indigo-600','border-indigo-600');
        loginTab.classList.remove('text-indigo-600','border-indigo-600');
    };

    roleSelect.onchange = function() {
        studentFields.classList.add('hidden-section');
        lecturerFields.classList.add('hidden-section');
        adminFields.classList.add('hidden-section');

        if (this.value === 'student') studentFields.classList.remove('hidden-section');
        if (this.value === 'lecturer') lecturerFields.classList.remove('hidden-section');
        if (this.value === 'admin') adminFields.classList.remove('hidden-section');
    };
</script>

</body>
</html>
