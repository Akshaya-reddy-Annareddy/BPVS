{% extends "student/base.html" %}
{% block content %}

<div class="max-w-2xl mx-auto glass p-8 rounded-2xl">
    <h2 class="text-2xl font-bold mb-6 text-indigo-400">
        Contact Admin
    </h2>

    <form method="POST">
        {% csrf_token %}
        <div class="space-y-4">
            <input type="text" name="subject"
                   placeholder="Subject"
                   required
                   class="w-full p-3 rounded-xl bg-white/5 border border-white/10">

            <textarea name="message"
                      placeholder="Describe your issue..."
                      rows="5"
                      required
                      class="w-full p-3 rounded-xl bg-white/5 border border-white/10"></textarea>

            <button type="submit"
                    class="px-6 py-3 bg-indigo-600 rounded-xl hover:bg-indigo-700">
                Submit Complaint
            </button>
        </div>
    </form>
</div>

{% endblock %}
