{% extends "student/base.html" %}
{% block content %}

<div class="max-w-3xl mx-auto space-y-10">

    <div class="glass p-8 rounded-2xl">
        <h2 class="text-2xl font-bold mb-6 text-indigo-400">
            Profile Details
        </h2>

        <div class="grid md:grid-cols-2 gap-6">
            <div>
                <label class="text-sm text-white/60">Username</label>
                <input type="text" value="{{ request.user.username }}"
                       class="w-full mt-2 p-3 rounded-xl bg-white/5 border border-white/10" disabled>
            </div>

            <div>
                <label class="text-sm text-white/60">Admission ID</label>
                <input type="text" value="{{ request.user.admission_id }}"
                       class="w-full mt-2 p-3 rounded-xl bg-white/5 border border-white/10" disabled>
            </div>

            <div>
                <label class="text-sm text-white/60">Course</label>
                <input type="text" value="{{ request.user.course }}"
                       class="w-full mt-2 p-3 rounded-xl bg-white/5 border border-white/10" disabled>
            </div>

            <div>
                <label class="text-sm text-white/60">Year</label>
                <input type="text" value="{{ request.user.year }}"
                       class="w-full mt-2 p-3 rounded-xl bg-white/5 border border-white/10" disabled>
            </div>
        </div>
    </div>

    <!-- Change Password -->
    <div class="glass p-8 rounded-2xl">
        <h2 class="text-xl font-bold mb-6 text-indigo-400">
            Change Password
        </h2>

        <form method="POST">
            {% csrf_token %}
            <div class="space-y-4">
                <input type="password" name="current_password"
                       placeholder="Current Password"
                       class="w-full p-3 rounded-xl bg-white/5 border border-white/10">

                <input type="password" name="new_password"
                       placeholder="New Password"
                       class="w-full p-3 rounded-xl bg-white/5 border border-white/10">

                <button type="submit"
                        class="px-6 py-3 bg-indigo-600 rounded-xl hover:bg-indigo-700">
                    Update Password
                </button>
            </div>
        </form>
    </div>

    <!-- Re-enroll -->
    <div class="glass p-8 rounded-2xl text-center">
        <h2 class="text-xl font-bold mb-4 text-indigo-400">
            Face Re-Enrollment
        </h2>

        {% if request.user.re_enroll_used %}
            <button disabled
                class="px-6 py-3 bg-gray-600 rounded-xl cursor-not-allowed">
                Re-Enroll Used
            </button>
        {% else %}
            <a href="{% url 'enrollment_instructions' %}"
               class="px-6 py-3 bg-yellow-600 rounded-xl hover:bg-yellow-700">
                Re-Enroll Face
            </a>
        {% endif %}
    </div>

</div>

{% endblock %}
