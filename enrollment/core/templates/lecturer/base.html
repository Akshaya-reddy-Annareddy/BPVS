{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lecturer Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
background:#0b0f1a;
font-family:'Poppins',sans-serif;
color:white;
overflow-x:hidden;
}

/* Sidebar */

.sidebar{
position:fixed;
left:-260px;
top:0;
width:260px;
height:100%;
background:#111827;
padding-top:60px;
transition:0.3s;
box-shadow:0 0 20px #00f7ff33;
z-index:1000;
}

.sidebar.active{
left:0;
}

.sidebar a{
display:block;
color:#d1d5db;
padding:14px 20px;
text-decoration:none;
transition:0.3s;
}

.sidebar a:hover{
background:#0f172a;
color:#00f7ff;
}

/* Navbar */

.navbar{
background:#020617;
box-shadow:0 0 10px #00f7ff33;
}

.hamburger{
font-size:24px;
cursor:pointer;
color:white;
}

.profile-icon{
width:40px;
height:40px;
border-radius:50%;
background:#00f7ff;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
cursor:pointer;
}

/* Cards */

.card{
background:#020617;
border:none;
border-radius:15px;
box-shadow:0 0 15px #00f7ff22;
color:white;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 25px #00f7ff55;
}

/* Content */

.content{
margin-left:0;
padding:20px;
transition:0.3s;
}

.content.shift{
margin-left:260px;
}

/* Neon button */

.neon-btn{
background:#00f7ff;
border:none;
color:black;
font-weight:600;
}

.neon-btn:hover{
background:#00c8d1;
}

</style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-dark px-3">

<span class="hamburger" onclick="toggleSidebar()">☰</span>

<div class="ms-auto">

<div class="dropdown">

<div class="profile-icon" data-bs-toggle="dropdown">
{{ request.user.first_name|first }}
</div>

<ul class="dropdown-menu dropdown-menu-end">

<li>
<a class="dropdown-item" href="{% url 'lecturer_profile' %}">Profile</a>
</li>

<li>
<a class="dropdown-item text-danger" href="{% url 'logout' %}">Logout</a>
</li>

</ul>

</div>

</div>

</nav>


<!-- Sidebar -->

<div class="sidebar" id="sidebar">

<a href="{% url 'lecturer_dashboard' %}">Dashboard</a>

<a href="{% url 'lecturer_classes' %}">Classes</a>

<a href="{% url 'lecturer_profile' %}">Profile</a>

<a href="{% url 'lecturer_contact' %}">Contact Admin</a>

</div>


<!-- Content -->

<div class="content" id="content">

{% block content %}

{% endblock %}

</div>


<script>

function toggleSidebar(){

document.getElementById("sidebar").classList.toggle("active");
document.getElementById("content").classList.toggle("shift");

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
