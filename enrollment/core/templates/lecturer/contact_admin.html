{% extends "lecturer/base.html" %}

{% block content %}

<h2 class="mb-4">Contact Admin</h2>

<div class="card p-4 col-md-8">

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label>Subject</label>

<input type="text" name="subject" class="form-control" required>

</div>

<div class="mb-3">

<label>Message</label>

<textarea name="message" rows="5" class="form-control" required></textarea>

</div>

<button class="btn neon-btn">Send</button>

</form>

</div>

{% endblock %}
