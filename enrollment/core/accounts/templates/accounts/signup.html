{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Lecturer Signup</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 min-h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">

<h2 class="text-3xl font-bold text-indigo-600 mb-6 text-center">
Lecturer Signup
</h2>

{% if error %}
<p class="text-red-500 text-center mb-4">
{{ error }}
</p>
{% endif %}

<form method="POST">
{% csrf_token %}

<input
type="text"
name="lecturer_id"
placeholder="Lecturer ID"
class="w-full mb-4 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500"
required
>

<input
type="text"
name="name"
placeholder="Full Name"
class="w-full mb-4 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500"
required
>

<input
type="password"
name="password"
placeholder="Password"
class="w-full mb-6 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500"
required
>

<button
type="submit"
class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition"
>
Register
</button>

</form>

<p class="text-center mt-4 text-sm">
Already have an account?
<a href="/accounts/login/" class="text-indigo-600 font-semibold">
Login
</a>
</p>

</div>

</body>
</html>
