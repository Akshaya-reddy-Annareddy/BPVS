<!DOCTYPE html>

<html>
<head>
    <title>Auth - Smart Attendance System</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding-top: 40px;
        }
        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            margin: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        input, select {
            width: 90%;
            padding: 10px;
            margin: 8px;
            border-radius: 6px;
            border: none;
        }
        button {
            padding: 10px 20px;
            margin-top: 10px;
            border: none;
            border-radius: 6px;
            background: #38bdf8;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #0ea5e9;
        }
        .hidden {
            display: none;
        }
        #status {
            margin-top: 15px;
            color: #facc15;
        }
    </style>
</head>
<body>

<h1>Smart Attendance System</h1>

<div class="card">
    <h2>Signup</h2>


<select id="role" onchange="toggleFields()">
    <option value="student">Student</option>
    <option value="lecturer">Lecturer</option>
    <option value="admin">Admin</option>
</select>

<input type="text" id="name" placeholder="Full Name" />

<!-- Student Fields -->
<div id="studentFields">
    <input type="text" id="admission_id" placeholder="Admission ID (23CAM1001)" />
    <input type="date" id="dob" />
</div>

<input type="password" id="password" placeholder="Create Password" />

<!-- Lecturer Fields -->
<div id="lecturerFields" class="hidden">
    <input type="text" id="lecturer_id" placeholder="Lecturer ID" />
</div>

<!-- Admin Fields -->
<div id="adminFields" class="hidden">
    <input type="text" id="admin_id" placeholder="Admin ID" />
</div>

<button onclick="signup()">Signup</button>

<hr style="margin:20px 0;">

<h2>Login</h2>
<input type="text" id="login_id" placeholder="User ID (Admission/Lecturer/Admin ID)" />
<input type="password" id="login_password" placeholder="Password" />
<button onclick="login()">Login</button>

<p id="status"></p>
```

</div>

<script>
function toggleFields() {
    const role = document.getElementById("role").value;

    document.getElementById("studentFields").classList.add("hidden");
    document.getElementById("lecturerFields").classList.add("hidden");
    document.getElementById("adminFields").classList.add("hidden");

    if (role === "student") {
        document.getElementById("studentFields").classList.remove("hidden");
    } else if (role === "lecturer") {
        document.getElementById("lecturerFields").classList.remove("hidden");
    } else {
        document.getElementById("adminFields").classList.remove("hidden");
    }
}

async function signup() {
    const role = document.getElementById("role").value;
    const name = document.getElementById("name").value;
    const password = document.getElementById("password").value;
    const dob = document.getElementById("dob").value;
    const admission_id = document.getElementById("admission_id").value;
    const lecturer_id = document.getElementById("lecturer_id").value;
    const admin_id = document.getElementById("admin_id").value;

    let payload = {
        role: role,
        name: name,
        password: password,
        dob: dob,
        admission_id: admission_id,
        lecturer_id: lecturer_id,
        admin_id: admin_id
    };

    const response = await fetch("/accounts/signup/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
    });

    const result = await response.json();
    document.getElementById("status").innerText = result.message || result.error;
}

async function login() {
    const user_id = document.getElementById("login_id").value;
    const password = document.getElementById("login_password").value;

    const response = await fetch("/accounts/login/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            user_id: user_id,
            password: password
        })
    });

    const result = await response.json();

    if (result.message) {
        document.getElementById("status").innerText = "Login successful!";

        // Save session data
        localStorage.setItem("user_id", result.user_id);
        localStorage.setItem("role", result.role);
        localStorage.setItem("face_enrolled", result.face_enrolled);

        // Redirect logic (VERY IMPORTANT for next steps)
        if (result.role === "student") {
            window.location.href = "/";
        } else if (result.role === "lecturer") {
            alert("Lecturer dashboard coming next step");
        } else {
            alert("Admin dashboard coming next step");
        }
    } else {
        document.getElementById("status").innerText = result.error;
    }
}
</script>

</body>
</html>
